spring:
    application:
        name: mobobs-worker

    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mobobs}
        username: ${POSTGRES_USER:mobobs}
        password: ${POSTGRES_PASSWORD:mobobs}
        driver-class-name: org.postgresql.Driver

    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
        consumer:
            group-id: mobobs-worker
            auto-offset-reset: earliest
            enable-auto-commit: false
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                # Do not rely on the producer's type header; always deserialize as TelemetryEnvelope
                spring.json.use.type.headers: false
                spring.json.value.default.type: com.mobobs.worker.telemetry.TelemetryEnvelope
                spring.json.trusted.packages: "com.mobobs.worker.telemetry"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

clickhouse:
    url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/mobobs}
    username: ${CLICKHOUSE_USER:default}
    password: ${CLICKHOUSE_PASSWORD:}

mobobs:
    alerts:
        enabled: true
        eval-interval-ms: 60000

logging:
    level:
        com.mobobs.worker: INFO
